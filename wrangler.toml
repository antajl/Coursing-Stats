name = "coursingstatsworker"
main = "backend/src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Прод-API: снимок SQLite на Pages (public/data/v1/pc-db.sqlite), без R2
# Сборка: npm run build-data-snapshot → deploy

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# D1 — только скрипты импорта / dev:d1 (прод-Worker не использует)
[[d1_databases]]
binding = "DB"
database_name = "pc-db"
database_id = "a5d6d4ad-7fc5-41b4-a33b-05f4daa382d4"
