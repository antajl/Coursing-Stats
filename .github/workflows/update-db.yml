name: Update D1 Database

on:
  schedule:
    # Каждый понедельник в 03:00 UTC (после cron Worker в 02:00)
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  update-db:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update current year data in D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node backend/scripts/ci-update-db.mjs
