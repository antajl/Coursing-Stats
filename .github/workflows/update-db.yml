name: Update D1 Database

on:
  schedule:
    # 4 раза в день: 08:00, 14:00, 20:00, 23:30 МСК (UTC+3) — как Донино
    - cron: "0 5 * * *"
    - cron: "0 11 * * *"
    - cron: "0 17 * * *"
    - cron: "30 20 * * *"
  workflow_dispatch:

jobs:
  update-db:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update current year data in D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx tsx backend/scripts/ci/ci-update-db.ts
