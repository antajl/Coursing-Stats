name: Update Speed Records

on:
  schedule:
    # Каждый день в 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  update-speed-records:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Sync speed records with Google Sheets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx tsx backend/scripts/speed/sync-speed-records.ts

      - name: Commit updated cache file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/speed-records.json
          git diff --staged --quiet || git commit -m "Update speed records cache [skip ci]"
          git push
