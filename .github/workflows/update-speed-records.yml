name: Update Speed Records

on:
  schedule:
    # Каждый день в 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  update-speed-records:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: pip install pymupdf requests

      - name: Fetch speed records from PDF
        run: python backend/scripts/fetch-speed-records-pdf.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Load speed records to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute pc-db --remote --file=./data/speed-records.sql -y
