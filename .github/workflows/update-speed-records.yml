name: Update Speed Records

on:
  schedule:
    # Каждый день в 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  update-speed-records:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and load speed records to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node backend/scripts/fetch-speed-records.mjs --remote
