name: Update Speed Records

on:
  schedule:
    # 4 раза в день: 08:00, 14:00, 20:00, 23:30 МСК (UTC+3)
    - cron: "0 5 * * *"
    - cron: "0 11 * * *"
    - cron: "0 17 * * *"
    - cron: "30 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-speed-records:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Export speed records from Google Sheets to JSON
        run: npx tsx backend/scripts/speed/export-speed-from-sheets.ts

      - name: Commit updated data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/v1/donino/speed_records.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update speed records from Google Sheets"
            git push
          fi
