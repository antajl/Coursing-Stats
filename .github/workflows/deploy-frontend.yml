name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Build data snapshot from data/v1
        run: npm run build-data-snapshot

      - name: Snapshot version for Worker cache bust
        id: snapshot
        run: |
          VERSION=$(sha256sum data/v1/pc-db.sqlite | awk '{print substr($1,1,16)}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Copy snapshot for Pages static fallback
        run: |
          mkdir -p frontend/public/data/v1 frontend/public/assets
          cp data/v1/pc-db.sqlite frontend/public/data/v1/
          cp data/v1/manifest.json frontend/public/data/v1/
          cp backend/assets/sql-wasm.wasm frontend/public/assets/

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.coursing-stats.ru

      # Pages first — Worker загружает pc-db.sqlite с coursing-stats.ru
      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=coursingstats --branch=main --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml --var DATA_SNAPSHOT_URL:https://coursing-stats.ru/data/v1/pc-db.sqlite?v=${{ steps.snapshot.outputs.version }}
