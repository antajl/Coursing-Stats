name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Build and package data for Pages
        run: npm run build-all-data

      - name: Verify static indexes are non-empty
        run: npx vitest run backend/tests/static-indexes.test.ts

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Prerender SEO HTML
        run: npm run prerender-seo

      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=coursingstats --branch=main --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # Worker больше не нужен для публичного сайта — фронтенд читает
      # /data/v1/*.json прямо с Pages CDN (см. docs/03-DATA.md). Админка
      # работает только локально через `npm run dev` (local-dev-server :8787).
      # Worker deploy в CI намеренно отключён.