    <script>
      // Если /assets/*.js не загрузился (MIME/HTML после деплоя) — reload с cache-bust.
      (function () {
        var KEY = 'cs:asset-reload';
        function reloadOnce() {
          try {
            var now = Date.now();
            var prev = Number(sessionStorage.getItem(KEY) || 0);
            if (prev && now - prev < 15000) return;
            sessionStorage.setItem(KEY, String(now));
          } catch (e) {}
          try {
            var u = new URL(location.href);
            u.searchParams.set('_csrb', String(Date.now()));
            location.replace(u.href);
          } catch (e2) {
            location.reload();
          }
        }
        window.addEventListener('error', function (e) {
          var t = e && e.target;
          if (!t || t.tagName !== 'SCRIPT') return;
          var src = t.src || '';
          if (src.indexOf('/assets/') !== -1) reloadOnce();
        }, true);
      })();
    </script>
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#1a1a1a');
        }
      })();
    </script>
